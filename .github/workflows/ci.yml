name: CI

on:
  pull_request:
  push:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xiangqi/package-lock.json

      - name: Install dependencies
        working-directory: xiangqi
        run: npm ci

      - name: Lint
        working-directory: xiangqi
        run: npm run lint

      - name: Test
        working-directory: xiangqi
        run: npm run test

      - name: Build Xiangqi
        working-directory: xiangqi
        run: npm run build

  build:
    runs-on: ubuntu-latest
    needs: verify

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xiangqi/package-lock.json

      - name: Install dependencies
        working-directory: xiangqi
        run: npm ci

      - name: Build Xiangqi
        working-directory: xiangqi
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: games-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run smoke test
        run: |
          docker run -d \
            --name games-test \
            -p 3000:3000 \
            games-test:latest

          echo "Waiting for container to start..."
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null 2>&1 && \
              curl -fsS http://127.0.0.1:3000/xiangqi > /dev/null 2>&1; then
              echo "Static routes are healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Timeout waiting for routes"
              docker logs games-test
              exit 1
            fi
            sleep 2
          done

          echo "Smoke test passed!"

      - name: Cleanup
        if: always()
        run: |
          docker stop games-test 2>/dev/null || true
          docker rm games-test 2>/dev/null || true

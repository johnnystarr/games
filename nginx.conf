server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root /usr/share/nginx/html;

    location = / {
        return 302 /xiangqi;
    }

    location = /xiangqi {
        try_files /xiangqi.html =404;
    }

    location = /xiangqi/ {
        return 302 /xiangqi;
    }

    location = /xiangqi.html {
        try_files /xiangqi.html =404;
    }

    location / {
        return 404;
    }
}